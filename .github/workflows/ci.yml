name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

  test:
    name: Test (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./... -timeout 5m -v -count=1

  # F0-8: per-engine integration matrix.
  # Spins up each engine via testcontainers-go and runs the SharedSuite
  # against it. Docker is pre-installed on ubuntu-latest runners.
  # Each engine runs in parallel; the matrix excludes SQLite because
  # that path is already covered by the `test` job above.
  #
  # Currently **advisory** (`continue-on-error: true`) because the first
  # cross-engine run surfaced 9 latent test-side bugs that were hidden
  # while CI ran only SQLite. The infrastructure itself is validated
  # (4/5 containers boot fine on this matrix); the matrix flips to
  # blocking once the follow-up fixes land. Tracked in TASKS.md
  # § "F0-8-followup".
  integration:
    name: Integration (${{ matrix.engine }})
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: postgres
            run: TestSuitePostgres
          - engine: mysql
            run: TestSuiteMySQL
          - engine: mariadb
            run: 'TestSuiteMariaDB|TestMariaDBCache'
          - engine: mssql
            run: TestSuiteMSSQL
          # Oracle is intentionally excluded from the matrix. Both
          # `gvenzl/oracle-free:23-slim` and `:23-slim-faststart` exit
          # with code 1 inside ~5 seconds on ubuntu-latest runners with
          # no startup log emitted. Likely a memory cap / kernel quirk
          # on hosted runners; gvenzl issue tracker has similar reports.
          # The `setupOracleContainer` helper stays in
          # `containers_test.go` so a developer with a working Oracle
          # runtime locally can still run
          # `go test -tags=integration -run TestSuiteOracle ./...`.
          # F0-8 followup F tracks the open investigation.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run ${{ matrix.engine }} suite
        timeout-minutes: ${{ matrix.timeout || 20 }}
        run: go test -tags=integration -timeout 25m -count=1 -run '^${{ matrix.run }}$' -v ./...
