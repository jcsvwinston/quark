name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: docs product voice
        # Keeps internal engineering vocabulary out of the published site.
        # A reader evaluating Quark does not know what ADR-0021 is, what "P0"
        # means, or what a "v1 gate" gates — those are artefacts of how we
        # build the thing, not of how anyone uses it. When they leak into
        # website/docs/** the docs read like our ticket queue instead of a
        # product. The internal tree (docs/adr/, SPEC.md, CLAUDE.md) is
        # untouched by this rule; only what we publish has to speak the
        # reader's language.
        run: bash scripts/ci/check_docs_product_voice.sh

      - name: lint docs
        # F0-10. Catches doc drift before it lands on main:
        # marketing language ("production-ready" / "enterprise-grade"
        # / "battle-tested"), references to the deleted
        # `RELEASE_NOTES_V1.md`, and broken relative links inside the
        # docs tree. Meta files (CLAUDE.md, TASKS.md, ADRs, blog
        # posts, versioned snapshots) are exempt — they discuss the
        # rules on purpose.
        run: bash scripts/lint-docs.sh

      - name: version coherence
        # H-Q6. The v1.2.0 release shipped while README/SECURITY/CLAUDE.md/
        # release-notes still claimed v1.1.5/v1.1.2/v1.1.0. This fails the
        # release-please PR (and any later drift) until the user-facing
        # version mentions match .release-please-manifest.json and the
        # current minor has a docs/RELEASE_NOTES_vX.Y.0.md.
        run: bash scripts/check-version-coherence.sh

      - name: superapp manifest freshness (S7-coverage)
        # The coverage gate's denominator (apisurface.json) and its
        # callable-surface allowlist (allowlist.json) are generated and
        # committed. Regenerate both and fail if they drift: a new public
        # symbol must land with a refreshed manifest in the same PR, so the
        # gate can never silently stop counting it. Order matters —
        # gen-allowlist reads apisurface.json, so regenerate it first.
        run: |
          go run ./examples/superapp/cmd/gen-apisurface
          go run ./examples/superapp/cmd/gen-allowlist
          if ! git diff --quiet examples/superapp/apisurface.json examples/superapp/allowlist.json; then
            echo "apisurface.json / allowlist.json are stale. Run:"
            echo "  go generate ./examples/superapp/..."
            echo "and commit the result. Drift:"
            git --no-pager diff --stat examples/superapp/apisurface.json examples/superapp/allowlist.json
            exit 1
          fi

  govulncheck:
    name: govulncheck
    # H-Q5. SECURITY.md points at the Go vulnerability database as the
    # source of truth for advisory status; this job is what backs that
    # claim. govulncheck only fails on vulnerabilities reachable from
    # Quark's code, so a red run is actionable, not noise.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  test:
    name: Test (SQLite)
    runs-on: ubuntu-latest
    # QK6-1: real Redis for the CacheLocker contract tests (ADR-0020,
    # cache/redis TestAcquireLock_*) and for the Redis cache subtests that
    # probe localhost:6379 (SharedSuite Caching/Redis, TestCacheAllEngines
    # FASE 4). This job runs `go test ./...` unfiltered, so exporting
    # QUARK_TEST_REDIS_ADDR is the whole gate — no -run pattern to update.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        env:
          QUARK_TEST_REDIS_ADDR: localhost:6379
        run: go test ./... -timeout 5m -v -count=1

  # QK7-2: the race detector had no lane — data races only surfaced when
  # someone remembered to run -race by hand, and the gate was not even
  # reproducible (two 11000-row batch tests blew the default per-query
  # timeout under -race on modest hardware; they now carry their own
  # budget). -short and no engine containers keep the lane fast; the
  # SQLite/fake-driver tests are where the executor/pool concurrency
  # (implicit-tx AfterFunc, deferred commits, replica failover) actually
  # runs, so this is where -race pays for itself.
  race:
    name: Race (-short)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with the race detector
        run: go test -race -short -count=1 -timeout 15m ./...

  # F6-8: the benchmark harness is its own module (separate go.mod with a
  # local `replace` directive), so the root `go test ./...` above does not
  # build it. This job compiles and smoke-runs it to keep it from rotting.
  # `-benchtime=1x` runs each benchmark exactly once — the goal is compile
  # + execute coverage, not stable numbers (those are produced on demand,
  # see benchmarks/README.md).
  benchmarks:
    name: Benchmarks (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # The benchmark module declares its own minimum Go version; pin
          # the toolchain to it so the module stays self-contained even if
          # its go.mod diverges from the root.
          go-version-file: benchmarks/go.mod
          cache: true

      - name: Build and smoke-run benchmarks
        working-directory: benchmarks
        run: |
          go vet ./...
          go test -run=^$ -bench=. -benchtime=1x -count=1 ./...

  # F0-8: per-engine integration matrix.
  # Spins up each engine and runs the SharedSuite against it. Docker is
  # pre-installed on ubuntu-latest runners. Each engine runs in parallel;
  # the matrix excludes SQLite (covered by the `test` job above).
  #
  # PG / MySQL / MariaDB / MSSQL boot via testcontainers-go inside the
  # test process. Oracle does NOT: testcontainers' lifecycle (reaper +
  # wait strategy) makes the gvenzl image exit code 1 within seconds on
  # hosted runners. Instead the `oracle` entry boots a plain `docker run`
  # container in a setup step and hands the suite a DSN via
  # QUARK_TEST_ORACLE_DSN — the proven path (v1.0 gate §A Item 1). When
  # that env var is set, `resolveOracleDSN` (containers_test.go) uses it
  # directly and skips testcontainers entirely.
  #
  # **Blocking** as of F0-8 followup final: a red light on any engine
  # fails the PR. The matrix landed first as advisory while the 11 latent
  # test-side bugs the first run surfaced were fixed in followups A-G;
  # with those closed, the matrix is now the canonical signal.
  integration:
    name: Integration (${{ matrix.engine }})
    runs-on: ubuntu-latest
    # Job-level cap covers the slowest engine (Oracle: ~3-6 min cold boot
    # + suite) plus the second run step (all-engines legs, QK6-1). Per-step
    # execution is bounded by each step's own timeout below; this only
    # sizes the wall-clock envelope.
    timeout-minutes: 45
    # QK6-1: real Redis in every lane. TestMariaDBCache/Redis and the
    # SharedSuite Caching/Redis subtest probe localhost:6379 and skipped
    # in every previous run of the matrix; with the service they execute.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each lane's `-run` filter must also name the standalone
          # integration tests that live OUTSIDE the SharedSuite
          # entrypoints (QK5-4): deadlock retry per engine, and — on
          # postgres — LISTEN/NOTIFY, native RLS isolation and the
          # quarktenant RLS install pipeline. They skip silently when no
          # DSN is resolvable, so leaving them out of the filter meant
          # no lane ever executed them. Keep the filter itself: it is
          # what bounds lane time.
          #
          # QK6-1: the filter is applied as `^(…)$` (see the run step) —
          # the previous `^…$` form anchored only the first and last
          # alternatives. `leg` names this lane's subtest in the
          # all-engines tests (TestCacheAllEngines / TestOtelAllEngines /
          # TestBenchmarkEngines), executed by the second run step so the
          # per-engine legs stop being dead code without fragmenting the
          # matrix into more jobs.
          - engine: postgres
            run: 'TestSuitePostgres|TestPostgresReplicaRouting|TestDeadlockRetryPostgres|TestPgListener_RoundTrip|TestRowLevelSecurityNativePostgresIsolation|TestInstallRLSPolicies_Postgres|TestInstallRLSPolicies_Postgres_NoTenantColumn'
            leg: Postgres
          - engine: mysql
            run: 'TestSuiteMySQL|TestDeadlockRetryMySQL'
            leg: MySQL
          - engine: mariadb
            # QK6-1: TestMariaDBOtel and TestMariaDBStress were outside
            # the filter (and read the raw env var) — never executed.
            run: 'TestSuiteMariaDB|TestMariaDBCache|TestMariaDBOtel|TestMariaDBStress|TestDeadlockRetryMariaDB'
            leg: MariaDB
          - engine: mssql
            run: TestSuiteMSSQL
            leg: MSSQL
          - engine: oracle
            run: TestSuiteOracle
            leg: Oracle
            # Oracle does a full DB init from scratch (~3 min cold) on
            # plain `:23-slim`; budget extra wall-clock for boot + suite.
            timeout: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Oracle-only: testcontainers crashes on hosted runners, so boot a
      # plain container, wait for readiness, grant DBMS_LOCK (the DSN path
      # bypasses the test helper's grant), and export the DSN. ADR-0018:
      # the migration lock needs EXECUTE ON DBMS_LOCK, not granted to
      # schema users by default.
      - name: Start Oracle
        if: matrix.engine == 'oracle'
        run: |
          docker run -d --name quark-oracle -p 1521:1521 \
            -e ORACLE_PASSWORD=quark \
            -e APP_USER=quark \
            -e APP_USER_PASSWORD=quark \
            gvenzl/oracle-free:23-slim

          echo "Waiting for Oracle to report ready..."
          # 6 min is ample (observed ~30-90s on hosted runners) and keeps the
          # worst case (setup + boot + 25m suite) inside the 35m job cap.
          deadline=$((SECONDS + 360))
          until docker logs quark-oracle 2>&1 | grep -q "DATABASE IS READY TO USE!"; do
            if [ $SECONDS -ge $deadline ]; then
              echo "Oracle did not become ready within 6 minutes; logs:"
              docker logs quark-oracle
              exit 1
            fi
            sleep 5
          done

          echo "Granting EXECUTE ON DBMS_LOCK to quark..."
          # -i is required: without it `docker exec` does not forward the
          # heredoc to sqlplus's stdin, so the grant silently no-ops (exit
          # 0, no SQL run) and the MigrationLock subtest later fails with
          # PLS-00201 on DBMS_LOCK. With -i the WHENEVER SQLERROR guard
          # below also actually fires on a failed/missing grant.
          docker exec -i quark-oracle sqlplus -S -L sys/quark@localhost:1521/FREEPDB1 as sysdba <<'SQL'
          WHENEVER SQLERROR EXIT SQL.SQLCODE
          GRANT EXECUTE ON DBMS_LOCK TO quark;
          EXIT
          SQL

          echo "QUARK_TEST_ORACLE_DSN=oracle://quark:quark@localhost:1521/FREEPDB1" >> "$GITHUB_ENV"

      - name: Run ${{ matrix.engine }} suite
        timeout-minutes: ${{ matrix.timeout || 20 }}
        run: go test -tags=integration -timeout 25m -count=1 -run '^(${{ matrix.run }})$' -v ./...

      # QK6-1: this lane's leg of the all-engines tests. The `/` in the
      # pattern splits it into (top-level regex)/(subtest regex), so only
      # the ${{ matrix.leg }} subtest body runs — under -tags=integration
      # its resolver boots this engine's container (or reuses the DSN the
      # oracle setup step exported). Root package only: all three tests
      # live there.
      - name: Run ${{ matrix.engine }} all-engines legs
        timeout-minutes: 15
        run: go test -tags=integration -timeout 14m -count=1 -run '^(TestCacheAllEngines|TestOtelAllEngines|TestBenchmarkEngines)$/^${{ matrix.leg }}$' -v .

  # S7-coverage: the superapp acceptance harness exercises Quark's public API
  # surface across all 6 engines in one process and gates on a manifest
  # (apisurface.json) minus an allowlist of non-invocable symbols
  # (allowlist.json). `-gate=strict` fails the PR if any in-scope public
  # symbol is left unexercised on a run engine, or if any exerciser asserts
  # red / leaks a goroutine or pool connection.
  #
  # Unlike the integration matrix, this is a SINGLE job with `-engines=all`:
  # the gate is union-based over one manifest, so fragmenting it per engine
  # would break its semantics. The harness boots PG/MySQL/MariaDB/MSSQL
  # itself via `docker run` (examples/superapp/engine); only Oracle needs the
  # same out-of-band setup as the integration job (testcontainers crashes the
  # gvenzl image on hosted runners), handed in via SUPERAPP_DSN_ORACLE — which
  # short-circuits the harness's own Docker management for Oracle.
  superapp:
    name: Superapp acceptance (6 engines)
    runs-on: ubuntu-latest
    # Boots Oracle (setup step) PLUS PG/MySQL/MariaDB/MSSQL (inside the run, via
    # the harness's own docker run) — more containers than the integration job's
    # single engine, so allow extra wall-clock headroom over its 35m.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Start Oracle
        run: |
          docker run -d --name quark-oracle -p 1521:1521 \
            -e ORACLE_PASSWORD=quark \
            -e APP_USER=quark \
            -e APP_USER_PASSWORD=quark \
            gvenzl/oracle-free:23-slim

          echo "Waiting for Oracle to report ready..."
          deadline=$((SECONDS + 360))
          until docker logs quark-oracle 2>&1 | grep -q "DATABASE IS READY TO USE!"; do
            if [ $SECONDS -ge $deadline ]; then
              echo "Oracle did not become ready within 6 minutes; logs:"
              docker logs quark-oracle
              exit 1
            fi
            sleep 5
          done

          echo "Granting EXECUTE ON DBMS_LOCK to quark..."
          # AcquireMigrationLock on Oracle needs EXECUTE ON DBMS_LOCK
          # (ADR-0018); not granted to schema users by default. -i forwards
          # the heredoc to sqlplus stdin (see the integration job note).
          docker exec -i quark-oracle sqlplus -S -L sys/quark@localhost:1521/FREEPDB1 as sysdba <<'SQL'
          WHENEVER SQLERROR EXIT SQL.SQLCODE
          GRANT EXECUTE ON DBMS_LOCK TO quark;
          EXIT
          SQL

          echo "SUPERAPP_DSN_ORACLE=oracle://quark:quark@localhost:1521/FREEPDB1" >> "$GITHUB_ENV"

      - name: Run superapp acceptance (all engines, strict gate)
        timeout-minutes: 25
        run: go run ./examples/superapp -engines=all -gate=strict
