name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

  test:
    name: Test (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./... -timeout 5m -v -count=1

  # F0-8: per-engine integration matrix.
  # Spins up each engine via testcontainers-go and runs the SharedSuite
  # against it. Docker is pre-installed on ubuntu-latest runners.
  # Each engine runs in parallel; the matrix excludes SQLite because
  # that path is already covered by the `test` job above.
  integration:
    name: Integration (${{ matrix.engine }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: postgres
            run: TestSuitePostgres
          - engine: mysql
            run: TestSuiteMySQL
          - engine: mariadb
            run: 'TestSuiteMariaDB|TestMariaDBCache'
          - engine: mssql
            run: TestSuiteMSSQL
          - engine: oracle
            run: TestSuiteOracle
            # Oracle initialises ~90s on cold boot; bump the timeout.
            timeout: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run ${{ matrix.engine }} suite
        timeout-minutes: ${{ matrix.timeout || 20 }}
        run: go test -tags=integration -timeout 25m -count=1 -run '^${{ matrix.run }}$' -v ./...
