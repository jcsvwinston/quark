name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt'd:"
            echo "$unformatted"
            exit 1
          fi

      - name: lint docs
        # F0-10. Catches doc drift before it lands on main:
        # marketing language ("production-ready" / "enterprise-grade"
        # / "battle-tested"), references to the deleted
        # `RELEASE_NOTES_V1.md`, and broken relative links inside the
        # docs tree. Meta files (CLAUDE.md, TASKS.md, ADRs, blog
        # posts, versioned snapshots) are exempt — they discuss the
        # rules on purpose.
        run: bash scripts/lint-docs.sh

  test:
    name: Test (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./... -timeout 5m -v -count=1

  # F0-8: per-engine integration matrix.
  # Spins up each engine via testcontainers-go and runs the SharedSuite
  # against it. Docker is pre-installed on ubuntu-latest runners.
  # Each engine runs in parallel; the matrix excludes SQLite (covered
  # by the `test` job above) and Oracle (see followup F — the gvenzl
  # images crash on hosted runners; the helper stays for local use).
  #
  # **Blocking** as of F0-8 followup final: PG / MySQL / MariaDB /
  # MSSQL all run the SharedSuite end-to-end and a red light fails
  # the PR. The matrix landed first as advisory while the 11 latent
  # test-side bugs the first run surfaced were fixed in followups
  # A-G; with those closed, the matrix is now the canonical signal.
  integration:
    name: Integration (${{ matrix.engine }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: postgres
            run: TestSuitePostgres
          - engine: mysql
            run: TestSuiteMySQL
          - engine: mariadb
            run: 'TestSuiteMariaDB|TestMariaDBCache'
          - engine: mssql
            run: TestSuiteMSSQL
          # Oracle is intentionally excluded from the matrix. Both
          # `gvenzl/oracle-free:23-slim` and `:23-slim-faststart` exit
          # with code 1 inside ~5 seconds on ubuntu-latest runners with
          # no startup log emitted. Likely a memory cap / kernel quirk
          # on hosted runners; gvenzl issue tracker has similar reports.
          # The `setupOracleContainer` helper stays in
          # `containers_test.go` so a developer with a working Oracle
          # runtime locally can still run
          # `go test -tags=integration -run TestSuiteOracle ./...`.
          # F0-8 followup F tracks the open investigation.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run ${{ matrix.engine }} suite
        timeout-minutes: ${{ matrix.timeout || 20 }}
        run: go test -tags=integration -timeout 25m -count=1 -run '^${{ matrix.run }}$' -v ./...
